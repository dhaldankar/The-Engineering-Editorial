<svg xmlns="http://www.w3.org/2000/svg" width="1013.6" height="492.28571428571433" viewBox="0 0 1013.6 492.28571428571433" font-family="system-ui, -apple-system, &quot;Segoe UI&quot;, Roboto, sans-serif" font-size="14" id="onboarding-create-org"><rect x="0" y="0" width="1013.6" height="492.28571428571433" fill="#ffffff" /><rect x="0.5" y="0.5" width="1012.6" height="491.28571428571433" fill="none" stroke="#505050" stroke-width="1.25" /><line x1="0" y1="36" x2="1013.6" y2="36" stroke="#b0b0b0" stroke-width="1" /><text x="506.8" y="23.333333333333332" text-anchor="middle" font-size="16" font-weight="600" fill="#2d2d2d">Create your organization</text><line x1="0" y1="81.71428571428572" x2="1013.6" y2="81.71428571428572" stroke="#b0b0b0" stroke-width="1" /><text x="391.0857142857143" y="65.28571428571428" font-weight="700" font-size="18" fill="#2d2d2d">The Engineering Editorial</text><text x="16" y="110.57142857142858" font-weight="700" font-size="12" fill="#3f7cc2">Step 1 of 3</text><rect x="16" y="122.85714285714286" width="486.8" height="18" fill="#dde0e4" rx="9" /><rect x="16" y="122.85714285714286" width="162.26666666666665" height="18" fill="#6b7078" rx="9" /><text x="16" y="161.71428571428572" font-size="12" fill="#7a7f87">Core Foundation</text><text x="510.8" y="110.57142857142858" font-size="12" fill="#7a7f87">Step 2</text><rect x="510.8" y="122.85714285714286" width="486.8" height="18" fill="#dde0e4" rx="9" /><rect x="510.8" y="122.85714285714286" width="0" height="18" fill="#6b7078" rx="9" /><text x="510.8" y="161.71428571428572" font-size="12" fill="#7a7f87">Integration</text><rect x="16.5" y="174.5" width="980.6" height="181.8571428571429" fill="none" stroke="#8a8a8a" stroke-width="1" stroke-dasharray="4 3" rx="2" /><text x="28" y="205.28571428571428" font-weight="700" font-size="18" fill="#2d2d2d">Create your organization</text><text x="28" y="234.71428571428572" fill="#7a7f87">Set up a dedicated workspace for your engineering teams. You'll be able to invite members and connect repositories in the next steps.</text><g opacity="1"><rect x="28.5" y="248.21428571428572" width="439" height="31" fill="#ffffff" stroke="#8a8a8a" stroke-width="1" rx="2" /><text x="40" y="268.3809523809524" fill="#9aa0a6">e.g. Acme Engineering</text></g><text x="28" y="300.57142857142856" font-size="12" font-style="italic" fill="#7a7f87">This will be used as the primary identifier for your editorial dashboards.</text><g opacity="1"><rect x="28.5" y="313.3571428571429" width="167.8" height="31" fill="#3a3a3a" stroke="#505050" stroke-width="1.25" rx="3" /><text x="112.4" y="333.5238095238096" text-anchor="middle" font-weight="500" fill="#ffffff">Create Organization</text></g><g transform="translate(16 364.8571428571429) scale(1.5)" color="#6b7078"><path d="M 3 14 L 3 5 L 5 5 L 5 3 L 11 3 L 11 5 L 13 5 L 13 14 Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" /><line x1="8" y1="5" x2="8" y2="14" stroke="currentColor" stroke-width="1" /></g><text x="16" y="409.7142857142857" font-weight="700" font-size="12" fill="#2d2d2d">Private by default</text><text x="16" y="434.8571428571429" font-size="12" fill="#7a7f87">Your engineering data remains isolated and encrypted within your org.</text><g transform="translate(510.8 364.8571428571429) scale(1.5)" color="#6b7078"><path d="M 4 2 L 11 2 L 13 4 L 13 14 L 4 14 Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" /><line x1="6" y1="7" x2="11" y2="7" stroke="currentColor" stroke-width="1" /><line x1="6" y1="10" x2="11" y2="10" stroke="currentColor" stroke-width="1" /></g><text x="510.8" y="409.7142857142857" font-weight="700" font-size="12" fill="#2d2d2d">Team Central</text><text x="510.8" y="434.8571428571429" font-size="12" fill="#7a7f87">Invite developers and managers with granular role-based access.</text><line x1="0" y1="455.14285714285717" x2="1013.6" y2="455.14285714285717" stroke="#b0b0b0" stroke-width="1" /><text x="775.4285714285714" y="478" font-size="12" fill="#7a7f87">Powered by The Engineering Editorial</text></svg>